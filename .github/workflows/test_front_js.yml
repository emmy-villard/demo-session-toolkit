name: Run Tests (front/js)

on:
  push:
    paths:
      - 'front/js/**'
  pull_request:
    paths:
      - 'front/js/**'

jobs:
  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: front/js
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'front/js/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test
